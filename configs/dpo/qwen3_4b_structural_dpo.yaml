### StructPO Stage 2: Structural Preference DPO
### Qwen3-4B, starting from Stage 1 DSE-SFT checkpoint
### Uses structural preference pairs (DSR-based, not length-based)

### Model (start from Stage 1 checkpoint)
model_name_or_path: models/structpo-qwen3-4b-stage1  # Or HuggingFace path
trust_remote_code: true

### Method
stage: dpo
do_train: true
finetuning_type: full
deepspeed: configs/deepspeed/ds_zero2.json
pref_beta: 0.1
pref_loss: sigmoid  # Standard DPO loss

### Dataset
dataset_dir: data/structural_pairs
dataset: structural_dpo_pairs
template: qwen3
cutoff_len: 16384
preprocessing_num_workers: 16
overwrite_cache: true

### Training hyperparameters
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
gradient_checkpointing: true
learning_rate: 1.0e-6
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### Logging & saving
logging_steps: 5
save_strategy: "no"
output_dir: models/structpo-qwen3-4b-stage2
overwrite_output_dir: true
report_to: none

### Flash attention
flash_attn: sdpa
