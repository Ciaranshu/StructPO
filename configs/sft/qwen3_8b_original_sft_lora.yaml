### StructPO Control: SFT on ORIGINAL (non-DSE) LIMO
### Qwen3-8B, LoRA fine-tuning with DeepSpeed ZeRO-2
### This is the control baseline — same data WITHOUT dead step elimination
### For BriCS GH200 (96GB per GPU)

### Model
model_name_or_path: /home/u5gx/cs2175.u5gx/workspace/CompRL/hpc/models/Qwen3-8B
trust_remote_code: true

### Method
stage: sft
do_train: true
finetuning_type: lora
deepspeed: configs/deepspeed/ds_zero2.json

### LoRA config (same as DSE variant for fair comparison)
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all

### Dataset (ORIGINAL, not DSE-cleaned)
dataset_dir: data/limo_cleaned
dataset: limo_original
template: qwen3
cutoff_len: 16384
preprocessing_num_workers: 16
overwrite_cache: true

### Training hyperparameters (identical to DSE variant)
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
gradient_checkpointing: true
learning_rate: 2.0e-5
num_train_epochs: 10
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### Logging & saving
logging_steps: 10
save_strategy: epoch
save_total_limit: 2
output_dir: models/structpo-qwen3-8b-original-sft-lora
overwrite_output_dir: true
report_to: none

### Flash attention
flash_attn: sdpa
